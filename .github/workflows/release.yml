name: release

# Publish to crates.io when a version tag is pushed:
#   git tag v0.1.0 && git push origin v0.1.0
#
# Needs a CARGO_REGISTRY_TOKEN repository secret. Mint it at
# https://crates.io/settings/tokens/new with the narrowest scope that works:
#   scope:  publish-update   (new versions of an existing crate — nothing else:
#                             no yank, no owner changes, no publishing new crates)
#   crates: digital-roster
#   expiry: set one; rotate when it lapses (a lapsed token fails this workflow
#           loudly at the publish step, which is the intended behavior)
# Then:  gh secret set CARGO_REGISTRY_TOKEN -R manasgarg/roster
# (paste at the prompt — the value never enters shell history)
on:
  push:
    tags: ["v*"]

jobs:
  publish:
    name: publish to crates.io
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: verify the tag matches Cargo.toml
        run: |
          tag="${GITHUB_REF_NAME#v}"
          crate=$(cargo metadata --no-deps --format-version 1 \
                  | python3 -c 'import json,sys; print(json.load(sys.stdin)["packages"][0]["version"])')
          echo "tag=$tag crate=$crate"
          test "$tag" = "$crate" || { echo "tag $tag != Cargo.toml $crate"; exit 1; }
      - name: test
        run: cargo test --locked
      # Idempotent: a version already on crates.io is a no-op, not a failure.
      # (Publishing by hand and then tagging is a normal thing to do.)
      - name: already published?
        id: check
        run: |
          v="${GITHUB_REF_NAME#v}"
          if curl -sf "https://crates.io/api/v1/crates/digital-roster/$v" -H 'User-Agent: roster-release' >/dev/null; then
            echo "digital-roster $v is already on crates.io — skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: publish
        if: steps.check.outputs.skip == 'false'
        run: cargo publish --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # The box image the binary pulls at server start (ghcr.io/manasgarg/roster-box).
  # GITHUB_TOKEN with packages:write is all the auth this needs — no extra secret.
  # One-time step after the FIRST push: the package is created private; flip it
  # to public at https://github.com/users/manasgarg/packages/container/roster-box/settings
  # or `docker pull` fails for everyone.
  box-image:
    name: publish the box image
    runs-on: ubuntu-latest
    needs: publish # crate tests passed (or the version was already live)
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # arm64 is built under QEMU — slow but simple, and it only runs on release.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: version tag
        id: v
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: box/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          # :latest is what deployments track (the host re-pulls it on every
          # server start); :<version> exists for rollback and forensics.
          tags: |
            ghcr.io/manasgarg/roster-box:latest
            ghcr.io/manasgarg/roster-box:${{ steps.v.outputs.version }}
