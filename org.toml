# Org base — OWNER-ONLY. Shared grants + fleet-aggregate caps + metering.
# Applies to every worker (scope "org"). Per-worker specs in workers/<name>/
# overlay their own grants and caps at scope "org/<name>".
# `deploy` compiles this + the worker specs into the runtime config.

# Egress grants shared by all workers.
[[grant]]
name = "model-api"
match = { host = ["chatgpt.com", "api.anthropic.com"], port = 443 }
verdict = "allow"
inject = { credential = "openai-codex" }

# Keyless web search: DuckDuckGo's no-JS HTML endpoint, GET-only. Metered as
# `searches`. Listed before web-fetch so search calls attribute here.
[[grant]]
name = "web-search"
match = { host = "html.duckduckgo.com", port = 443, method = ["GET"] }
verdict = "allow"

# Web read: fetch any page the model chooses to open (a web-search result, or a
# URL it already has). Deliberately broad but constrained — GET-only (reads, never
# writes), https-only, metered and capped below. Tighten `host` to an allowlist, or
# move this grant into one worker's spec, to narrow it. (Future hardening: block
# private/link-local ranges at the gateway so a fetch can't reach the host's own LAN.)
[[grant]]
name = "web-fetch"
match = { host = "*", port = 443, method = ["GET"] }
verdict = "allow"

# Actions the workers may PROPOSE (the box submits an envelope; the gateway
# executes or gates). intent = action name (D15). trust "auto" runs immediately;
# "gate" (the T0 default) waits for a human at `roster gates`.
[[action]]
name = "message-user"
executor = "message-user"
trust = "auto"

[[action]]
name = "email-send"
executor = "email"
trust = "gate"
wake_on_resolve = true  # after the owner decides, wake the worker to react

# Trust ladder: promote a narrow slice of an action to auto. Here, email to
# internal addresses runs without a gate; anything else (external recipient)
# falls through to the T0 gate. A list matches only if EVERY recipient does.
[[trust]]
intent = "email-send"
match = { to = "manasgarg@gmail.com" }
level = "auto"

# Earned trust: an external email still gates at first, but after 3 clean
# approvals for this worker the privilege is earned and further ones auto-send.
# A single denial revokes it (back to gating). Listed after the internal rule.
[[trust]]
intent = "email-send"
level = "earned"
after = 3

# Code tasks: the box edits a writable worktree, then proposes the change. On
# approval the git-pr executor commits, pushes the branch, and opens a PR — git
# push is direct (the gateway can't govern git's wire protocol); the box never
# holds the remote credential.
[[action]]
name = "code-change"
executor = "git-pr"
trust = "gate"

# A channel's trusted participants may refine its purpose. Identity remains an
# owner-only file and is not exposed as a worker tool.
[[action]]
name = "purpose-edit"
executor = "purpose"
trust = "gate"

# Scoped memory. The note executor applies its own scope/actor checks and may
# raise worker-wide or inferred writes to a gate regardless of this base trust.
[[action]]
name = "remember"
executor = "note"
trust = "auto"

[[action]]
name = "forget"
executor = "note"
trust = "auto"

[[action]]
name = "memory-correct"
executor = "note"
trust = "auto"

[[action]]
name = "memory-disable"
executor = "note"
trust = "auto"

[[action]]
name = "memory-enable"
executor = "note"
trust = "auto"

[[action]]
name = "memory-pin"
executor = "note"
trust = "auto"

[[action]]
name = "memory-unpin"
executor = "note"
trust = "auto"

[[action]]
name = "memory-preferences"
executor = "note"
trust = "auto"

# Reply in a Discord channel. Gated by default; a trust rule can auto a reply in
# a specific channel (e.g. the owner's DM) once earned.
[[action]]
name = "discord-send"
executor = "discord"
trust = "gate"

# Fleet-wide memory defaults. A worker may make these stricter or smaller in
# workers/<name>/worker.toml with its own [memory] table.
[memory]
enabled = true
allowed_kinds = ["preference", "fact", "decision", "research", "interaction"]
max_note_chars = 2000
max_notes_per_scope = 100
recall_max_notes = 20
recall_char_budget = 6000
# max_retention_days = 365  # optional hard maximum; unset keeps durable notes
allow_inferred_user_auto = false
allow_worker_auto = false
cross_channel_user_recall = false
user_memory_in_groups = false

# Context injected into each model turn. Worker specs may override these limits
# for a particular worker.
[context]
max_injected_chars = 48000
identity_max_chars = 12000
purpose_max_chars = 8000
briefing_max_chars = 4000
task_max_chars = 24000

[budget]
currencies = ["model_calls", "searches", "fetches", "usd"]
vars = { price = { search = 0.005 } }

# How calls map to currency spend (shared).
[[budget.meter]]
match = "decision.rule == 'model-api'"
spend = { model_calls = "1" }

[[budget.meter]]
match = "decision.rule == 'web-search'"
spend = { searches = "1", usd = "vars.price.search" }

[[budget.meter]]
match = "decision.rule == 'web-fetch'"
spend = { fetches = "1" }

# Fleet-aggregate caps (scope "org" — all workers roll up into these).
[[budget.limit]]
currency = "searches"
window = "day"
max = 1000

[[budget.limit]]
currency = "fetches"
window = "day"
max = 5000
